name: CI

on:
  push:
    branches: [main, dev, "release/**"]
  pull_request:
    branches: [main, dev]

jobs:
  ci:
    runs-on: ubuntu-latest

    env:
      # Tests mock Prisma so no real DB is needed. DATABASE_URL is required by
      # `prisma generate` to resolve the datasource block in schema.prisma.
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci?schema=public"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
