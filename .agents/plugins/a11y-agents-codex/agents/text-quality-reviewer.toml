name = "text-quality-reviewer"
description = "Non-visual text quality reviewer for web applications. Use when reviewing any page, component, or template for low-quality alt text, aria-labels, or button names. Detects template variables ({0}, {{var}}), code syntax in text attributes (property.alttext), pla"
