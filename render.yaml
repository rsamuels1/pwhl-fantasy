services:
  - type: web
    name: pwhl-draft-server
    runtime: node
    plan: standard         # upgrade from starter before draft week — 2 GB RAM, faster CPU
    buildCommand: npm install
    startCommand: npx tsx scripts/draft-server.ts
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false            # set manually in Render dashboard (prod Neon connection string)
      - key: NODE_ENV
        value: production
